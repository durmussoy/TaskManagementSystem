{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="auth-shell">
    <div class="card auth-card">
        <div class="card-body p-4">
            <div class="text-center mb-4">
                <div class="sidebar-brand-icon mx-auto mb-3" style="width:60px;height:60px;font-size:2rem;">
                    <i class="bi bi-list-check"></i>
                </div>
                <h2 class="page-title mb-1">TaskRemainder</h2>
                <p class="text-muted mb-0">Log in to continue</p>
            </div>
            {% if form.errors %}
            <div class="alert alert-danger">Incorrect username or password.</div>
            {% endif %}
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label" for="{{ form.username.id_for_label }}">Username</label>
                    {{ form.username }}
                </div>
                <div class="mb-4">
                    <label class="form-label" for="{{ form.password.id_for_label }}">Password</label>
                    {{ form.password }}
                </div>
                <button type="submit" class="btn-primary-gradient w-100">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Log In
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
